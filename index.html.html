<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indiasoft Dashboard</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 min-h-screen">

<header class="bg-indigo-600 text-white p-4">
    <h1 class="text-xl font-bold">Indiasoft Dashboard</h1>
    Total Leads: <span id="total-count">0</span>
</header>

<main class="p-6 grid grid-cols-1 lg:grid-cols-4 gap-6">

<!-- FORM -->
<div class="bg-white p-4 rounded shadow">
    <h2 class="font-bold mb-3">Add Lead</h2>

    <form id="leadForm" class="space-y-3">
        <input id="name" placeholder="Name" required class="w-full p-2 border rounded">
        <input id="company" placeholder="Company" required class="w-full p-2 border rounded">
        <input id="email" placeholder="Email" required class="w-full p-2 border rounded">

        <input id="industry" placeholder="Industry (type anything)" class="w-full p-2 border rounded">

        <select id="status" class="w-full p-2 border rounded">
            <option>Active</option>
            <option>Passive</option>
            <option>Neutral</option>
            <option>Not Interested</option>
        </select>

        <select id="stage" class="w-full p-2 border rounded">
            <option>Demo Setup</option>
            <option>Exploratory Meeting</option>
            <option>Nurturing</option>
            <option>Calling</option>
        </select>

        <button class="w-full bg-indigo-600 text-white p-2 rounded">Add</button>
    </form>
</div>

<!-- TABLE -->
<div class="lg:col-span-3 bg-white rounded shadow overflow-x-auto">

    <div class="flex flex-col lg:flex-row justify-between items-center p-4 border-b gap-3">
        <h2 class="text-lg font-semibold">Pipeline</h2>

        <div class="flex gap-2">
            
            <select id="filterStage" class="border p-1 rounded">
                <option value="">All Stages</option>
                <option>Demo Setup</option>
                <option>Exploratory Meeting</option>
                <option>Nurturing</option>
                <option>Calling</option>
            </select>

            <select id="filterStatus" class="border p-1 rounded">
                <option value="">All Status</option>
                <option>Active</option>
                <option>Passive</option>
                <option>Neutral</option>
                <option>Not Interested</option>
            </select>

            <button onclick="clearLeads()" class="text-red-500 text-sm font-medium">
                Clear All
            </button>
        </div>
    </div>

    <table class="w-full text-left text-sm">
        <thead class="bg-gray-100">
            <tr>
                <th class="px-4 py-2">Name</th>
                <th class="px-4 py-2">Company</th>
                <th class="px-4 py-2">Industry</th>
                <th class="px-4 py-2">Email</th>
                <th class="px-4 py-2">Status</th>
                <th class="px-4 py-2">Stage</th>
                <th class="px-4 py-2">Date</th>
                <th class="px-4 py-2 text-right">Action</th>
            </tr>
        </thead>

        <tbody id="leadTableBody"></tbody>
    </table>

    <div id="emptyState" class="p-6 text-center text-gray-400">
        No leads yet
    </div>

</div>
</main>

<script>
let leads = JSON.parse(localStorage.getItem('leads')) || [];

const form = document.getElementById('leadForm');
const table = document.getElementById('leadTableBody');
const count = document.getElementById('total-count');
const empty = document.getElementById('emptyState');

const nameInput = document.getElementById('name');
const companyInput = document.getElementById('company');
const emailInput = document.getElementById('email');
const industryInput = document.getElementById('industry');
const statusInput = document.getElementById('status');
const stageInput = document.getElementById('stage');

const filterStage = document.getElementById('filterStage');
const filterStatus = document.getElementById('filterStatus');

function updateUI() {
    table.innerHTML = '';

    let filteredLeads = leads.filter(lead => {
        return (
            (filterStage.value === '' || lead.stage === filterStage.value) &&
            (filterStatus.value === '' || lead.status === filterStatus.value)
        );
    });

    count.innerText = filteredLeads.length;

    if (filteredLeads.length === 0) {
        empty.style.display = 'block';
        return;
    }

    empty.style.display = 'none';

    filteredLeads.forEach((lead, i) => {
        const row = `
        <tr class="border-t">
            <td class="px-4 py-2">${lead.name}</td>
            <td class="px-4 py-2">${lead.company}</td>
            <td class="px-4 py-2">${lead.industry}</td>
            <td class="px-4 py-2">${lead.email}</td>
            <td class="px-4 py-2">${lead.status}</td>
            <td class="px-4 py-2">${lead.stage}</td>
            <td class="px-4 py-2">${lead.date}</td>
            <td class="px-4 py-2 text-right">
                <button onclick="deleteLead(${i})" class="text-red-500 font-bold">X</button>
            </td>
        </tr>`;
        table.innerHTML += row;
    });

    localStorage.setItem('leads', JSON.stringify(leads));
}

form.addEventListener('submit', function(e) {
    e.preventDefault();

    leads.push({
        name: nameInput.value,
        company: companyInput.value,
        email: emailInput.value,
        industry: industryInput.value,
        status: statusInput.value,
        stage: stageInput.value,
        date: new Date().toLocaleDateString()
    });

    form.reset();
    updateUI();
});

function deleteLead(i) {
    leads.splice(i, 1);
    updateUI();
}

function clearLeads() {
    if (confirm("Are you sure you want to delete all leads?")) {
        leads = [];
        updateUI();
    }
}

filterStage.addEventListener('change', updateUI);
filterStatus.addEventListener('change', updateUI);

updateUI();
</script>

</body>
</html>
